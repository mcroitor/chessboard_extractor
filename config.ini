# blur size
blur_size        = 21

blur_standard   = 0
blur_median     = 0
blur_gaussian   = 1

# close small gaps in Canny edges before contour search
close_gaps      = 1
morph_kernel_size = 5
morph_iterations  = 1

contour_delta    = 50

# page file format
format   = png

# delta for comparing in pixels
gap      = 50

# merge close bounding rectangles (in pixels) during optimize step
merge_gap = 8

#input directory
input    = .\in\

# max board size
max_board_size   = 700

# min board size
min_board_size   = 500

#output directory
output   = .\out\

remove_non_squares       = 1

# the red contour thickness, drawed over 
thickness        = 5

#
treshold         = 100